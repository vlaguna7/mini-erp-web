services:
  postgres:
    image: postgres:15-alpine
    container_name: mini_erp_db
    environment:
      POSTGRES_DB: ${DB_NAME:-mini_erp}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mini_erp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mini_erp_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-mini_erp}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_in_production}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mini_erp_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mini_erp_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - mini_erp_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: mini_erp_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - mini_erp_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  mini_erp_network:
    driver: bridge